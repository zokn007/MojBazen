name: Firebase production deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Prenesi datoteke
        uses: actions/checkout@v4

      - name: Prijava v Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Namesti Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Namesti Firebase CLI
        run: npm install --global firebase-tools

      - name: Preveri prijavo
        run: firebase projects:list

      - name: Objavi Hosting in Firestore pravila
        run: firebase deploy --only hosting,firestore:rules --non-interactive
